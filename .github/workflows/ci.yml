name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Audits, integration tests, F-Droid release builds
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Fetch release assets (ML models)
        run: ./scripts/fdroid-prebuild.sh

      - name: F-Droid verification gate
        run: ./gradlew --no-daemon fdroidVerify

      - name: Upload prod release APKs
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: prod-release-apks
          retention-days: 14
          path: |
            apps/*/build/outputs/apk/prod/release/*.apk
