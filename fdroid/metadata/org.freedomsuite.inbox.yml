AutoName: Freedom Inbox
Summary: Private IMAP/SMTP mail — no tracking
Description: |-
  Freedom Inbox syncs mail from your provider (e.g. mailbox.org) over
  IMAP/SMTP. Local mail is stored in an encrypted database. No analytics,
  no crash reporting, no Google Play Services.

  Swipe to archive. Local and server search. Calendar invite detection.

